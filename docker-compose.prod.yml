version: '3.8'

services:

  mongo:
    image: mongo:6
    volumes:
      - mongo_prod:/data/db
    networks:
      - prod-net

  ms-auth:
    image: eminope/ms-auth:${VERSION}
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/authdb
    networks:
      - prod-net

  ms-client:
    image: eminope/ms-client:${VERSION}
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/customerdb
    networks:
      - prod-net

  ms-pedidos:
    image: eminope/ms-pedidos:${VERSION}
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/customerdb
    networks:
      - prod-net

  api-gateway:
    image: eminope/ms-api-gateway:${VERSION}
    networks:
      - prod-net
  
  nginx:
    build:
      context: nginx-custom  
    container_name: nginx-dev
    ports:
      - "8090:80"
    depends_on:
      - api-gateway
    networks:
      - dev-net

volumes:
  mongo_prod:

networks:
  prod-net: